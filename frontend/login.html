<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WiFi Zone OS — Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .logo .icon { font-size: 3rem; }
    .logo h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; margin-top: 0.4rem; }
    .logo p  { font-size: 0.8rem; color: #aaa; margin-top: 0.2rem; }

    label { display: block; font-size: 0.8rem; color: #bbb; margin-bottom: 0.3rem; }

    input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    input:focus { border-color: #7c3aed; }
    input::placeholder { color: #666; }

    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">📡</div>
      <h1>WiFi Zone OS</h1>
      <p>Admin Login — V3</p>
    </div>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <label for="user">Username</label>
      <input id="user" type="text" placeholder="admin" autocomplete="username" required />

      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" required />

      <button type="submit" id="btn">Login</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user: document.getElementById('user').value.trim(),
            pass: document.getElementById('pass').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Invalid credentials');
          return;
        }

        window.location.href = data.redirect || '/admin/dashboard.html';
      } catch {
        showError('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }
  </script>
</body>
</html>
