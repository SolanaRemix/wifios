<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WiFi Zone OS — Change Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo .icon { font-size: 2.5rem; }
    .logo h1 { font-size: 1.2rem; margin-top: 0.4rem; }
    .logo p { font-size: 0.8rem; color: #f59e0b; margin-top: 0.3rem; }
    label { display: block; font-size: 0.8rem; color: #bbb; margin-bottom: 0.3rem; }
    input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    input:focus { border-color: #f59e0b; }
    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.88; }
    .msg { font-size: 0.85rem; padding: 0.6rem 0.9rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
    .msg.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; }
    .msg.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: #86efac; }
    .msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">🔐</div>
      <h1>Set New Password</h1>
      <p>⚠️ First-login required</p>
    </div>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <form id="changeForm">
      <label>New Password (min 8 characters)</label>
      <input id="pass" type="password" placeholder="New password" required minlength="8" />

      <label>Confirm Password</label>
      <input id="confirm" type="password" placeholder="Confirm password" required />

      <button type="submit">Set Password</button>
    </form>
  </div>

  <script>
    document.getElementById('changeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pass = document.getElementById('pass').value;
      const confirm = document.getElementById('confirm').value;
      const err = document.getElementById('errorMsg');
      const ok = document.getElementById('successMsg');

      err.classList.remove('visible');
      ok.classList.remove('visible');

      if (pass !== confirm) {
        err.textContent = 'Passwords do not match.';
        err.classList.add('visible');
        return;
      }

    const res = await fetch('/change-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': sessionStorage.getItem('csrfToken') || '',
        },
        body: JSON.stringify({ pass }),
      });

      const data = await res.json();
      if (res.ok) {
        ok.textContent = 'Password changed! Redirecting…';
        ok.classList.add('visible');
        setTimeout(() => { window.location.href = '/admin/dashboard.html'; }, 1500);
      } else {
        err.textContent = data.error || 'Error changing password.';
        err.classList.add('visible');
      }
    });
  </script>
</body>
</html>
